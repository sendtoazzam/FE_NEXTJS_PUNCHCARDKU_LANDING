# Nginx does not use .htaccess. Use a snippet like this in your server block.
# Adjust root to your deployed `out/` (static export) or static asset path.

server {
  listen 80;
  server_name example.com;
  root /var/www/punchcardku-landing/out-production;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /_next/static {
    alias /var/www/punchcardku-landing/out/_next/static;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
